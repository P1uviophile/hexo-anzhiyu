# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html
## Source: https://github.com/hexojs/hexo/

# Site
title: Klog
subtitle: "知易行难,行胜于言"
description: ''
keywords:
author: Joking
language: en
timezone: ''
email: 2083717185@qq.com

# URL
## Set your site url here. For example, if you use GitHub Page, set url as 'https://username.github.io/project'
url: http://example.com
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true # Set to false to remove trailing 'index.html' from permalinks
  trailing_html: true # Set to false to remove trailing '.html' from permalinks

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:  
  - "md_editor/**"

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link:
  enable: true # Open external links in new tab
  field: site # Apply to the whole site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
# path: Root path for your blogs index page. (default = '')
# per_page: Posts displayed per page. (0 = disable pagination)
# order_by: Posts order. (Order by date descending by default)
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
## https://developer.mozilla.org/en-US/docs/Web/HTML/Element/meta
meta_generator: true

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss
## updated_option supports 'mtime', 'date', 'empty'
updated_option: 'mtime'

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
## include:/exclude: options only apply to the 'source/' folder
include:
exclude:
ignore:

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: anzhiyu

# Deployment
## Docs: https://hexo.io/docs/one-command-deployment
deploy:
  type: git
  repo: git@github.com:P1uviophile/P1uviophile.github.io.git
  branch: gh-pages


# APlayer
# https://github.com/MoePlayer/hexo-tag-aplayer/blob/master/docs/README-zh_cn.md
aplayer:
  meting: true
  asset_inject: false


# hexo-admin安全设置 - 玖涯博客
admin:
  username: Joking
  password_hash: $2a$10$H9RTbpImfZX9GnknDO3iaOAXZ0Qh/GkBUrit7BGQF8xOM0M8lwl8G
  secret: why so serious?
  deployCommand: ./admin-script/hexo-d.bat


# hexo-admin默认文章参数
metadata:
  cover: 


# 本地搜索配置
search:
  path: search.xml
  field: post  # page - will only covers all the pages of your blog || all - will covers all the posts and pages of your blog.
  content: true  # 是否包含每篇文章的全部内容。
  # template: ./search.xml  # （可选） - 自定义 XML 模板的路径


## live2d
## 使用静态看板娘请去 themes\anzhiyu\layout\includes\head.pug 注释掉95 96 97行
## 使用静态看板娘请安装hexo-helper-live2d
## 使用API看板娘请卸载hexo-helper-live2d, 并解除上面的注释
live2d:
  enable: true # 是否开启live2d
  scriptFrom: local # 脚本从本地引入
  pluginRootPath: live2dw/ # 插件在站点上的根目录(相对路径)
  pluginJsPath: lib/ # 脚本文件相对与插件根目录路径
  pluginModelPath: assets/ # 模型文件相对与插件根目录路径
  tagMode: false # 标签模式, 是否仅替换 live2d tag标签而非插入到所有页面中
  debug: true # 调试, 是否在控制台输出日志
  model:
      use: soyo # 填写放进live2d_models文件夹中的模型文件夹名字
      # use: live2d-widget-model-wanko
      scale: 1 # canvas 模型与canvas的缩放
  display:
      width: 150 # 宽度
      height: 300 # 高度
      position: right # 显示位置
      hOffset: 0 #水平偏移
      vOffset: 0 #垂直偏移
  mobile:
      show: false # 手机端是否显示
      scale: 0.5 # 移动设备上的缩放
  react:
      opacity: 0.5 # 透明度
  dialog:
      enable: false # Display dialog 显示人物对话框
      hitokoto: false # Enable hitokoto 使用一言API
  dev:
      border: false # 显示live2D范围


encrypt:
  enable: true
  abstract: 有东西被加密了, 请输入密码查看
  message: 您好, 这里需要密码
  wrong_pass_message: 抱歉, 这个密码看着不太对, 请再试试
  wrong_hash_message: 抱歉, 这个文章不能被校验, 不过您还是能看看解密后的内容